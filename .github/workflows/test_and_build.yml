name: RcloneManager CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # Windows 환경에서 실행 (tkinter/ctypes 호환)

    steps:
    - name: 코드를 체크아웃합니다.
      uses: actions/checkout@v4

    - name: Python 3.11을 설정합니다.
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 의존성 라이브러리를 설치합니다.
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: GUI 애플리케이션 빌드 테스트 (PyInstaller)
      run: |
        # --noconsole: 터미널 창 없는 GUI 모드
        # --onefile: 단일 실행 파일 생성
        pyinstaller --noconsole --onefile --name "RcloneManager" main.py

    - name: 빌드된 결과물을 업로드합니다.
      uses: actions/upload-artifact@v4
      with:
        name: RcloneManager-Windows-Exe
        path: dist/RcloneManager.exe
