name: Codecov

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-freezegun \
                      pytest-homeassistant-custom-component \
                      coverage pytest-cov

          if [ -f custom_components/kma_weather/manifest.json ]; then
            REQ_LIST=$(jq -r '.requirements[]?' custom_components/kma_weather/manifest.json)
            if [ -n "$REQ_LIST" ]; then
              pip install $REQ_LIST
            fi
          fi

      - name: Run Pytest with Coverage
        run: |
          pytest test_rclone_manager.py \
            --cov=. \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --no-header -v \
            --tb=short \
            --color=no \
            --durations=10 | tee pytest-coverage.txt || echo "Tests failed but continuing to report"

      - name: Generate Detailed Statement Coverage Report
        if: always()
        run: |
          if [ ! -f pytest-coverage.txt ]; then exit 0; fi
          echo "### рҹ“Ҡ 1. кө¬л¬ё м»ӨлІ„лҰ¬м§Җ мғҒм„ё (Statement Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| нҢҢмқј кІҪлЎң | м „мІҙ лқјмқё мҲҳ | мӢӨн–ү к°ҖлҠҘ кө¬л¬ё | мӢӨн–ү м•Ҳ лҗЁ | кө¬л¬ё м»ӨлІ„лҰ¬м§Җ(%) | лҲ„лқҪлҗң кө¬л¬ё лқјмқё |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---|" >> $GITHUB_STEP_SUMMARY
          
          # rclone_manager.pyлҘј н•„н„°л§Ғн•ҳлҸ„лЎқ мҲҳм •
          grep -E "^rclone_manager\.py" pytest-coverage.txt | while read -r line; do
            FILE_PATH=$(echo $line | awk '{print $1}')
            STMTS=$(echo $line | awk '{print $2}')
            MISS=$(echo $line | awk '{print $3}')
            TOTAL_LINES=$(wc -l < "$FILE_PATH" | xargs)
            PER=$(awk -v s="$STMTS" -v m="$MISS" 'BEGIN {if (s > 0) printf "%.1f%%", ((s - m) / s) * 100; else print "0%"}')
            MISSING_RAW=$(echo $line | awk '{for(i=7;i<=NF;i++) printf "%s ", $i}')
            MISSING_LINES=$(echo $MISSING_RAW | tr ' ' '\n' | grep -v "\->" | tr '\n' ' ' | sed 's/ $//')
            if [ -z "$MISSING_LINES" ]; then MISSING_LINES="-"; fi
            echo "| $FILE_PATH | $TOTAL_LINES | $STMTS | $MISS | **$PER** | $MISSING_LINES |" >> $GITHUB_STEP_SUMMARY
          done || true

      - name: Generate Detailed Branch Coverage Report
        if: always()
        run: |
          if [ ! -f pytest-coverage.txt ]; then exit 0; fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### рҹҢҝ 2. л¶„кё° м»ӨлІ„лҰ¬м§Җ мғҒм„ё (Branch Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| нҢҢмқј кІҪлЎң | м „мІҙ л¶„кё° мҲҳ | мӢӨн–үлҗң л¶„кё° | мӢӨн–ү м•Ҳ лҗЁ | л¶„кё° м»ӨлІ„лҰ¬м§Җ(%) | лҲ„лқҪлҗң л¶„кё° (нҷ”мӮҙн‘ң) |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---|" >> $GITHUB_STEP_SUMMARY
          
          # н•„н„°л§Ғ лҢҖмғҒмқ„ rclone_manager.pyлЎң мҲҳм •
          grep -E "rclone_manager\.py" pytest-coverage.txt | while read -r line; do
            FILE_PATH=$(echo $line | awk '{print $1}')
            # --cov-branch мӮ¬мҡ© мӢң м—ҙ мҲңм„ң: Name Stmts Miss Branch BrPart Cover Missing
            BRANCH=$(echo $line | awk '{print $4}')
            BR_MISS=$(echo $line | awk '{print $5}')
            
            PER=$(awk -v b="$BRANCH" -v m="$BR_MISS" 'BEGIN {if (b > 0) printf "%.1f%%", ((b - m) / b) * 100; else print "-"}')
            
            # лҲ„лқҪлҗң л¶„кё° м •ліҙ(->) м¶”м¶ң
            MISSING_RAW=$(echo $line | awk '{for(i=7;i<=NF;i++) printf "%s ", $i}')
            MISSING_BRANCHES=$(echo $MISSING_RAW | tr ' ' '\n' | grep "\->" | tr '\n' ' ' | sed 's/ $//')
            if [ -z "$MISSING_BRANCHES" ]; then MISSING_BRANCHES="-"; fi
            
            if [ "$BRANCH" = "0" ] || [ -z "$BRANCH" ]; then
              echo "| $FILE_PATH | 0 | 0 | 0 | - | - |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $FILE_PATH | $BRANCH | $(($BRANCH - $BR_MISS)) | $BR_MISS | **$PER** | $MISSING_BRANCHES |" >> $GITHUB_STEP_SUMMARY
            fi
          done || true

      - name: Generate Final Summary
        if: always()
        run: |
          if [ ! -f pytest-coverage.txt ]; then exit 0; fi

          # TOTAL лқјмқёмқ„ м•Ҳм „н•ҳкІҢ м¶”м¶ңн•©лӢҲлӢӨ. (м—җлҹ¬ л°©м§Җ)
          TOTAL_LINE=$(grep "^TOTAL" pytest-coverage.txt || echo "")
          if [ -z "$TOTAL_LINE" ]; then exit 0; fi

          STMTS=$(echo $TOTAL_LINE | awk '{print $2}')
          MISS=$(echo $TOTAL_LINE | awk '{print $3}')
          BRANCH=$(echo $TOTAL_LINE | awk '{print $4}')
          BR_MISS=$(echo $TOTAL_LINE | awk '{print $5}')

          STMT_PER=$(awk -v s="$STMTS" -v m="$MISS" 'BEGIN {if (s > 0) printf "%.2f%%", ((s - m) / s) * 100; else print "0%"}')
          BRANCH_PER=$(awk -v b="$BRANCH" -v m="$BR_MISS" 'BEGIN {if (b > 0) printf "%.2f%%", ((b - m) / b) * 100; else print "0%"}')

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### рҹ“Ҳ мөңмў… м»ӨлІ„лҰ¬м§Җ мҡ”м•Ҫ" >> $GITHUB_STEP_SUMMARY
          echo "| мёЎм • л°©мӢқ | м»ӨлІ„лҰ¬м§ҖмңЁ | мғҒм„ё мҲҳм№ҳ (м„ұкіө/м „мІҙ) |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **кө¬л¬ё(Statement)** | **$STMT_PER** | $(($STMTS - $MISS)) / $STMTS |" >> $GITHUB_STEP_SUMMARY
          echo "| **л¶„кё°(Branch)** | **$BRANCH_PER** | $(($BRANCH - $BR_MISS)) / $BRANCH |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          # мӮ¬мҡ©мһҗлӢҳмқҳ кіөк°ң м ҖмһҘмҶҢ м„Өм •(Not required)м—җ л”°лқј нҶ нҒ° м—Ҷмқҙ м§„н–үн•ҳлҗҳ, 
          # мқјмӢңм Ғмқё м—…лЎңл“ң мӢӨнҢЁлЎң CIк°Җ л©Ҳм¶”м§Җ м•ҠкІҢ н•©лӢҲлӢӨ.
          fail_ci_if_error: false
          verbose: true
