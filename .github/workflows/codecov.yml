name: Codecov

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-freezegun \
                      pytest-homeassistant-custom-component \
                      coverage pytest-cov

          if [ -f custom_components/kma_weather/manifest.json ]; then
            REQ_LIST=$(jq -r '.requirements[]?' custom_components/kma_weather/manifest.json)
            if [ -n "$REQ_LIST" ]; then
              pip install $REQ_LIST
            fi
          fi

      - name: Run Pytest with Coverage
        run: |
          # pytest가 실패하더라도 결과 파일 생성을 시도합니다.
          pytest tests/ \
            --cov=custom_components.kma_weather \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --no-header -v \
            --tb=short \
            --color=no \
            --durations=10 | tee pytest-coverage.txt || echo "Pytest failed"

      - name: Generate Detailed Statement Coverage Report
        if: always()
        run: |
          if [ ! -f pytest-coverage.txt ]; then exit 0; fi
          
          echo "### 📊 1. 구문 커버리지 상세 (Statement Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 경로 | 전체 라인 수 | 실행 가능 구문 | 실행 안 됨 | 구문 커버리지(%) | 누락된 구문 라인 |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---|" >> $GITHUB_STEP_SUMMARY
          
          # grep이 실패하더라도 스크립트가 종료되지 않도록 || true 추가
          LINES=$(grep -E "^custom_components" pytest-coverage.txt || true)
          if [ -z "$LINES" ]; then exit 0; fi

          echo "$LINES" | while read -r line; do
            FILE_PATH=$(echo $line | awk '{print $1}')
            STMTS=$(echo $line | awk '{print $2}')
            MISS=$(echo $line | awk '{print $3}')
            TOTAL_LINES=$(wc -l < "$FILE_PATH" | xargs)
            PER=$(awk -v s="$STMTS" -v m="$MISS" 'BEGIN {if (s > 0) printf "%.1f%%", ((s - m) / s) * 100; else print "0%"}')
            MISSING_RAW=$(echo $line | awk '{for(i=7;i<=NF;i++) printf "%s ", $i}')
            MISSING_LINES=$(echo $MISSING_RAW | tr ' ' '\n' | grep -v "\->" | tr '\n' ' ' | sed 's/ $//')
            if [ -z "$MISSING_LINES" ]; then MISSING_LINES="-"; fi
            echo "| $FILE_PATH | $TOTAL_LINES | $STMTS | $MISS | **$PER** | $MISSING_LINES |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Generate Detailed Branch Coverage Report
        if: always()
        run: |
          if [ ! -f pytest-coverage.txt ]; then exit 0; fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌿 2. 분기 커버리지 상세 (Branch Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 경로 | 전체 분기 수 | 실행된 분기 | 실행 안 됨 | 분기 커버리지(%) | 누락된 분기 (화살표) |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---|" >> $GITHUB_STEP_SUMMARY
          
          LINES=$(grep -E "^custom_components" pytest-coverage.txt || true)
          if [ -z "$LINES" ]; then exit 0; fi

          echo "$LINES" | while read -r line; do
            FILE_PATH=$(echo $line | awk '{print $1}')
            BRANCH=$(echo $line | awk '{print $4}')
            BR_MISS=$(echo $line | awk '{print $5}')
            PER=$(awk -v b="$BRANCH" -v m="$BR_MISS" 'BEGIN {if (b > 0) printf "%.1f%%", ((b - m) / b) * 100; else print "-"}')
            MISSING_RAW=$(echo $line | awk '{for(i=7;i<=NF;i++) printf "%s ", $i}')
            MISSING_BRANCHES=$(echo $MISSING_RAW | tr ' ' '\n' | grep "\->" | tr '\n' ' ' | sed 's/ $//')
            if [ -z "$MISSING_BRANCHES" ]; then MISSING_BRANCHES="-"; fi
            
            if [ "$BRANCH" -eq 0 ]; then
              echo "| $FILE_PATH | 0 | 0 | 0 | - | - |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $FILE_PATH | $BRANCH | $(($BRANCH - $BR_MISS)) | $BR_MISS | **$PER** | $MISSING_BRANCHES |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Generate Final Summary
        if: always()
        run: |
          if [ ! -f pytest-coverage.txt ]; then exit 0; fi

          # TOTAL 라인을 안전하게 추출 (실패 시 빈 값 반환)
          TOTAL_LINE=$(grep "^TOTAL" pytest-coverage.txt || true)
          if [ -z "$TOTAL_LINE" ]; then exit 0; fi

          STMTS=$(echo $TOTAL_LINE | awk '{print $2}')
          MISS=$(echo $TOTAL_LINE | awk '{print $3}')
          BRANCH=$(echo $TOTAL_LINE | awk '{print $4}')
          BR_MISS=$(echo $TOTAL_LINE | awk '{print $5}')

          STMT_PER=$(awk -v s="$STMTS" -v m="$MISS" 'BEGIN {if (s > 0) printf "%.2f%%", ((s - m) / s) * 100; else print "0%"}')
          BRANCH_PER=$(awk -v b="$BRANCH" -v m="$BR_MISS" 'BEGIN {if (b > 0) printf "%.2f%%", ((b - m) / b) * 100; else print "0%"}')

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 최종 커버리지 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 측정 방식 | 커버리지율 | 상세 수치 (성공/전체) |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **구문(Statement)** | **$STMT_PER** | $(($STMTS - $MISS)) / $STMTS |" >> $GITHUB_STEP_SUMMARY
          echo "| **분기(Branch)** | **$BRANCH_PER** | $(($BRANCH - $BR_MISS)) / $BRANCH |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
