name: Code Coverage Summary

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        shell: bash
        run: |
          # 여기서만 커버리지 옵션을 명시적으로 사용
          python -m pytest test_rclone_manager.py \
            --cov=rclone_manager \
            --cov-branch \
            --cov-report=term-missing \
            --color=no \
            2>&1 | tee cov-output.txt

      - name: Publish Coverage to Summary
        shell: bash
        run: |
          RAW_DATA=$(grep -E "^rclone_manager\.py\s+" cov-output.txt | head -1 || true)
          TOTAL_DATA=$(grep -E "^TOTAL\s+" cov-output.txt | tail -1 || true)

          echo "### 📊 1. 구문 커버리지 상세 (Statement Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 경로 | 전체 라인 수 | 실행 가능 구문 | 실행 안 됨 | 구문 커버리지(%) | 누락된 구문 라인 |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---|" >> $GITHUB_STEP_SUMMARY
          echo "$RAW_DATA" | awk '{printf "| %s | 479 | %s | %s | **%.1f%%** | %s |\n", $1, $2, $3, (($2-$3)/$2)*100, $7}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🌿 2. 분기 커버리지 상세 (Branch Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 경로 | 전체 분기 수 | 실행된 분기 | 실행 안 됨 | 분기 커버리지(%) | 누락된 분기 (화살표) |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---|" >> $GITHUB_STEP_SUMMARY
          echo "$RAW_DATA" | awk '{printf "| %s | %s | %s | %s | **%.1f%%** | %s |\n", $1, $4, ($4-$5), $5, (($4-$5)/$4)*100, $7}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📈 최종 커버리지 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 측정 방식 | 커버리지율 | 상세 수치 (성공/전체) |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "$TOTAL_DATA" | awk '{printf "| **구문(Statement)** | **%.2f%%** | %d / %d |\n", (($2-$3)/$2)*100, ($2-$3), $2}' >> $GITHUB_STEP_SUMMARY
          echo "$TOTAL_DATA" | awk '{printf "| **분기(Branch)** | **%.2f%%** | %d / %d |\n", (($4-$5)/$4)*100, ($4-$5), $4}' >> $GITHUB_STEP_SUMMARY

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
