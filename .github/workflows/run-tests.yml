name: BDD Functional Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Run BDD Tests on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        shell: bash
        run: |
          set +e
          # 커버리지 옵션 없이 순수하게 테스트만 실행
          python -m pytest test_rclone_manager.py \
            --no-header \
            --tb=short \
            --color=no \
            -v \
            2>&1 | tee pytest-output.txt
          
          PYTEST_EXIT=${PIPESTATUS[0]}
          echo "PYTEST_EXIT=$PYTEST_EXIT" >> $GITHUB_ENV
          exit $PYTEST_EXIT

      - name: Publish Test Summary
        if: always()
        shell: bash
        run: |
          SUMMARY_LINE=$(grep -E "[0-9]+ (passed|failed|error)" pytest-output.txt | tail -1 || true)

          if [ "${PYTEST_EXIT:-0}" = "0" ]; then
            echo "### ✅ BDD 테스트 결과: 전체 통과" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ BDD 테스트 결과: 실패 있음" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${SUMMARY_LINE}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📋 실행된 테스트 전체 목록</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "::" pytest-output.txt | sed 's/  *\[[ 0-9]*%\]$//; s/ PASSED$/  ✓/; s/ FAILED$/  ✗/; s/ ERROR$/  !/; s/ SKIPPED$/  (skipped)/' >> $GITHUB_STEP_SUMMARY || echo "(없음)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          FAIL_COUNT=$(grep -cE "^(FAILED|ERROR) " pytest-output.txt 2>/dev/null || echo 0)
          if [ "$FAIL_COUNT" -gt "0" ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ 실패 상세" >> $GITHUB_STEP_SUMMARY
            awk '/^_{5,}/ { in_fail=1; print ""; print; next } in_fail && /^={5,}/ { in_fail=0; next } in_fail { print }' pytest-output.txt >> $GITHUB_STEP_SUMMARY || true
          fi
