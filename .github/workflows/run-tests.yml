name: BDD Functional Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Run BDD Tests on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 커버리지 측정을 위해 pytest-cov 설치 필수
          pip install pytest pytest-asyncio pytest-cov requests pystray Pillow

      - name: Run Tests
        shell: bash
        run: |
          set +e
          # --cov=rclone_manager --cov-branch 옵션을 통해 분기 커버리지 데이터 생성
          python -m pytest test_rclone_manager.py \
            --cov=rclone_manager \
            --cov-branch \
            --cov-report=term-missing \
            --no-header \
            --tb=short \
            --color=no \
            -v \
            2>&1 | tee pytest-output.txt
          
          PYTEST_EXIT=${PIPESTATUS[0]}
          echo "PYTEST_EXIT=$PYTEST_EXIT" >> $GITHUB_ENV
          exit $PYTEST_EXIT

      - name: Publish Test Summary
        if: always()
        shell: bash
        run: |
          # 1. 요약 데이터 추출
          SUMMARY_LINE=$(grep -E "[0-9]+ (passed|failed|error)" pytest-output.txt | tail -1 || true)
          # 커버리지 결과 라인 추출 (Stmts, Miss, Branch, BrPart, Cover 순서)
          COV_DATA=$(grep "rclone_manager.py" pytest-output.txt | head -1)
          TOTAL_DATA=$(grep "TOTAL" pytest-output.txt | tail -1)

          # ── 헤더 + 요약 ──────────────────────────────────────────────────
          if [ "${PYTEST_EXIT:-0}" = "0" ]; then
            echo "### ✅ BDD 테스트 결과: 전체 통과" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ BDD 테스트 결과: 실패 있음" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${SUMMARY_LINE}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── 📊 1. 구문 커버리지 상세 (Statement Coverage) ─────────────────
          echo "### 📊 1. 구문 커버리지 상세 (Statement Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 경로 | 전체 라인 수 | 실행 가능 구문 | 실행 안 됨 | 구문 커버리지(%) | 누락된 구문 라인 |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---| " >> $GITHUB_STEP_SUMMARY
          
          # awk를 이용해 rclone_manager.py 행의 $1(파일명), $2(Stmts), $3(Miss) 등 매핑
          echo "$COV_DATA" | awk '{print "| " $1 " | 479 | " $2 " | " $3 " | **" $4 "%** | " $7 " |"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── 🌿 2. 분기 커버리지 상세 (Branch Coverage) ───────────────────
          echo "### 🌿 2. 분기 커버리지 상세 (Branch Coverage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 경로 | 전체 분기 수 | 실행된 분기 | 실행 안 됨 | 분기 커버리지(%) | 누락된 분기 (화살표) |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---| " >> $GITHUB_STEP_SUMMARY
          
          # 분기 데이터($4=Branch, $5=BrPart) 매핑
          echo "$COV_DATA" | awk '{print "| " $1 " | " $4 " | " $4-$5 " | " $5 " | **" $6 "** | " $7 " |"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── 📈 최종 커버리지 요약 ─────────────────────────────────────────
          echo "### 📈 최종 커버리지 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 측정 방식 | 커버리지율 | 상세 수치 (성공/전체) |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---| " >> $GITHUB_STEP_SUMMARY
          
          STMT_PERCENT=$(echo "$TOTAL_DATA" | awk '{print $4}')
          BRANCH_PERCENT=$(echo "$TOTAL_DATA" | awk '{print $6}')
          
          echo "| **구문(Statement)** | **$STMT_PERCENT** | $(echo "$TOTAL_DATA" | awk '{print $2-$3 "/" $2}') |" >> $GITHUB_STEP_SUMMARY
          echo "| **분기(Branch)** | **$BRANCH_PERCENT** | $(echo "$TOTAL_DATA" | awk '{print $4-$5 "/" $4}') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── 실행된 테스트 전체 목록 (기존 형식 유지) ───────────────────────
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📋 실행된 테스트 전체 목록 (클릭하여 펼치기)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "::" pytest-output.txt \
            | sed 's/  *\[[ 0-9]*%\]$//' \
            | sed 's/ PASSED$/  ✓/' \
            | sed 's/ FAILED$/  ✗  ← FAILED/' \
            | sed 's/ ERROR$/  !  ← ERROR/' \
            | sed 's/ SKIPPED$/  (skipped)/' \
            >> $GITHUB_STEP_SUMMARY || echo "(없음)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── 실패 상세 (기존 로직 유지) ───────────────────────────────────
          FAIL_COUNT=$(grep -cE "^(FAILED|ERROR) " pytest-output.txt 2>/dev/null || echo 0)
          if [ "$FAIL_COUNT" -gt "0" ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ 실패 상세" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**실패한 테스트:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^(FAILED|ERROR) " pytest-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Traceback:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            awk '/^_{5,}/ { in_fail=1; print ""; print; next } in_fail && /^={5,}/ { in_fail=0; next } in_fail { print }' pytest-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
