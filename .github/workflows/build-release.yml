name: Build and Release RcloneManager

on:
  release:
    types: [published]
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow requests

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed `
            --name "RcloneManager" `
            --hidden-import "pystray._win32" `
            --hidden-import "PIL._tkinter_finder" `
            rclone_manager.py

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\RcloneManager.exe -DestinationPath RcloneManager.zip

      - name: Generate Tag Name for Manual Run
        if: github.event_name == 'workflow_dispatch'
        id: generate_tag
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          echo "TAG_NAME=v$timestamp" >> $env:GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && env.TAG_NAME || github.event.release.tag_name }}
          files: RcloneManager.zip
          # ★ 추가된 부분: 수동 실행일 때만 Pre-release로 체크되도록 설정
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
