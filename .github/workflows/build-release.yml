name: Build and Release RcloneManager

on:
  release:
    types: [published]
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow requests

      # ── 1. 상태 변수 설정 (수동/자동 완벽 분기) ──
      - name: Set Build Context
        id: context
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            # [수동 실행] 타임스탬프 태그 생성 / 버전 업데이트 안 함 / 프리 릴리스
            $tag = "v" + (Get-Date -Format "yyyyMMdd-HHmmss")
            echo "TAG_NAME=$tag" >> $env:GITHUB_ENV
            echo "SHOULD_UPDATE_VERSION=false" >> $env:GITHUB_ENV
            echo "PRERELEASE=true" >> $env:GITHUB_ENV
            echo "Mode: Manual (No version update, Pre-release)"
          } else {
            # [릴리스 발행] 태그 사용 / 버전 업데이트 수행 / 정식 릴리스
            $tag = "${{ github.event.release.tag_name }}"
            $cleanVer = $tag.TrimStart('v')
            echo "TAG_NAME=$tag" >> $env:GITHUB_ENV
            echo "CLEAN_VERSION=$cleanVer" >> $env:GITHUB_ENV
            echo "SHOULD_UPDATE_VERSION=true" >> $env:GITHUB_ENV
            echo "PRERELEASE=false" >> $env:GITHUB_ENV
            echo "Mode: Release (Version update to $cleanVer, Official)"
          }

      # ── 2. 소스 코드 내 APP_VERSION 수정 (릴리스 발행 시에만 실행) ──
      - name: Update APP_VERSION in Python Script
        if: env.SHOULD_UPDATE_VERSION == 'true'
        shell: pwsh
        run: |
          $filePath = "rclone_manager.py"
          $newVersion = "${{ env.CLEAN_VERSION }}"
          (Get-Content $filePath) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$newVersion`"" | Set-Content $filePath
          echo "Updated APP_VERSION to $newVersion"

      # ── 2-1. 변경된 소스 코드를 저장소로 다시 Push ──
      - name: Commit and Push Version Change
        if: env.SHOULD_UPDATE_VERSION == 'true'
        shell: pwsh
        run: |
          # Git 사용자 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항 커밋
          git add rclone_manager.py
          git commit -m "chore: update version to ${{ env.CLEAN_VERSION }} [skip ci]"
          
          # 현재 브랜치로 푸시 (권한이 필요합니다)
          git push origin HEAD:${{ github.event.release.target_commitish }}
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed `
            --name "RcloneManager" `
            --hidden-import "pystray._win32" `
            --hidden-import "PIL._tkinter_finder" `
            rclone_manager.py

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\RcloneManager.exe -DestinationPath RcloneManager.zip

      # ── 3. 릴리스 업로드 (기존 프리 릴리스 로직 유지) ──
      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: RcloneManager.zip
          prerelease: ${{ env.PRERELEASE }}
