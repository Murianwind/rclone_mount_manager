name: Build and Release RcloneManager

on:
  push:
    tags:
      - 'v*' # v1.0.0, v2.1 등 'v'로 시작하는 태그가 푸시될 때만 실행
  workflow_dispatch: # 수동으로 빌드를 실행할 수 있는 버튼 활성화

permissions:
  contents: write # 릴리스 생성 및 파일 업로드를 위한 권한

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest # Windows 환경에서 실행 (exe 빌드 필수)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          # 주의: 에러를 발생시켰던 cache: 'pip' 줄을 삭제했습니다.

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow requests

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed ^
            --name "RcloneManager" ^
            --hidden-import "pystray._win32" ^
            --hidden-import "PIL._tkinter_finder" ^
            rclone_manager.py

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\RcloneManager.exe -DestinationPath RcloneManager.zip

      - name: Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') 
        with:
          files: RcloneManager.zip
          generate_release_notes: true
