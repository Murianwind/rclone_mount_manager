[pytest]
# 현재 디렉토리를 pythonpath에 추가하여 rclone_manager를 인식하게 함
pythonpath = .

# asyncio 설정 (최신 pytest-asyncio 규격 적용)
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto

# 실행 옵션: --cov-branch를 추가하여 분기 커버리지 측정을 기본값으로 설정
addopts =
    --no-header
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --cov-branch

# 커스텀 마커 등록
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
