[pytest]
# 현재 디렉토리를 pythonpath에 추가하여 rclone_manager를 인식하게 함
pythonpath = .

# asyncio 설정 (최신 pytest-asyncio 규격 적용)
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto

# 실행 옵션: 여기서 --cov-branch를 제거해. (일반 테스트는 빠르게!)
addopts =
    --no-header
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# 커스텀 마커 등록
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
