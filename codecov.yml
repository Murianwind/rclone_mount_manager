# Codecov configuration
coverage:
  status:
    project:
      default:
        target: 85%      # Overall project coverage goal
        threshold: 2%    # Allow up to 2% drop below target
    patch:
      default:
        target: 80%      # Coverage goal for newly added code

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false  # Post comment even if there is no coverage change
